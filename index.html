<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Clon Post Instagram</title>


    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

   
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
    <div class="page">
      
      <div class="insta-post">
       
        <div class="post-header">
          <div class="user-info">
            <i class="fa-regular fa-user"></i>
            <div class="user-text">
              <p class="username">html5</p>
              <p class="location">Rigoberto</p>
            </div>
          </div>
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>

        
        <div class="post-image">
          <img
            src="https://images.pexels.com/photos/248797/pexels-photo-248797.jpeg"
            alt="Foto del post"
          />
        </div>

        
        <div class="post-actions">
          <div class="left-icons">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-comment"></i>
            <i class="fa-regular fa-paper-plane"></i>
          </div>
          <div class="right-icons">
            <i class="fa-regular fa-bookmark"></i>
          </div>
        </div>

        
        <div class="post-likes">
          <p>Liked by <strong>4GeeksAcademy</strong> and <strong>100,000 others</strong></p>
        </div>

       
        <div class="post-caption">
          <p>
            <span class="username">html5</span>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec
            vehicula, nunc at aliquet placerat, justo arcu tincidunt lorem, sed
            facilisis justo urna at ipsum.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
